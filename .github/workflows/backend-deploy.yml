name: Deploy Backend (Cloudflare Workers)

# A pipeline será disparada sempre que houver um push na branch main
# e se houver alterações nos arquivos dentro da pasta backend
on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy Backend

    steps:
      # 1. Baixa o código do repositório para a máquina virtual do GitHub
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Instala o ambiente do Node.js
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-node: 20
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      # 3. Instala as dependências do Hono dentro da pasta backend
      - name: Instalar dependências do Backend
        run: |
          cd backend
          npm install

      # 4. Executa a Action oficial da Cloudflare para fazer o Deploy do Worker
      - name: Deploy para o Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Como estamos em um monorepo, avisamos à action em qual pasta rodar:
          workingDirectory: 'backend'